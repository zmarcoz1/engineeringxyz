<!-- components/contact-form.html -->
<!-- A reusable contact form component. This markup is identical to the form in contact.html. -->
<form id="contactForm" class="contact-form" novalidate>
  <label for="name" data-i18n="contact_form_name">Your Name</label>
  <input type="text" id="name" name="name" required aria-required="true" />
  <label for="email" data-i18n="contact_form_email">Your Email</label>
  <input type="email" id="email" name="email" required aria-required="true" />
  <label for="phone" data-i18n="contact_form_phone">Your Phone</label>
  <input type="tel" id="phone" name="phone" pattern="[0-9\-+() ]{7,20}" />
  <label for="message" data-i18n="contact_form_message">Your Message</label>
  <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>
  <div>
    <input type="checkbox" id="consent" name="consent" required aria-required="true" />
    <label for="consent">I consent to the collection and use of my information in accordance with the privacy policy.</label>
  </div>
  <button type="submit" data-i18n="contact_form_submit">Send Message</button>
</form>
